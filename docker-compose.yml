services:
  db:
    image: postgres:16-alpine
    container_name: data-dashboard-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-data_dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-data_dashboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-data_dashboard} -d ${POSTGRES_DB:-data_dashboard}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data_dashboard_net

  nginx:
    image: nginx:1.27-alpine
    container_name: data-dashboard-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - data_dashboard_net

volumes:
  postgres_data:

networks:
  data_dashboard_net:
    name: data-dashboard-net
